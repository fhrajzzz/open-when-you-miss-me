<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open When 💌</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<div class="container">

  <h1 class="title">open when you need me 💌</h1>

  <!-- password -->
  <div class="card" id="lock">
    <p>enter password</p>
    <input type="password" id="pass" placeholder="••••••">
    <button onclick="unlock()">unlock</button>
  </div>

  <!-- letters menu -->
  <div class="menu" id="menu">
    <h2>choose a letter ✿</h2>
    <button onclick="openLetter('miss')">💌 miss me</button>
    <button onclick="openLetter('sad')">💔 sad</button>
    <button onclick="openLetter('tired')">😴 tired</button>
    <button onclick="openLetter('happy')">🎉 happy</button>
    <button onclick="openLetter('proud')">🌿 need reassurance</button>
    <button onclick="openLetter('alone')">🌙 feel alone</button>

    <!-- hidden trigger -->
    <button class="secret-btn" onclick="openSecret()">???</button>
  </div>

  <!-- letter -->
  <div class="letter" id="letter">
    <p id="text"></p>
    <button onclick="closeLetter()">back</button>
  </div>

</div>

<!-- floating hearts -->
<div class="hearts">
  <span>💚</span><span>🤍</span><span>💚</span><span>🤍</span><span>💚</span>
</div>

<script src="script.js"></script>
</body>
</html>
