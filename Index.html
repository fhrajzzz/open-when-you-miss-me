<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Open When You Miss Me</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<div class="container">

  <h1 h1 class="title">open when you miss me 💌</h1>

  <div class="card">
    <p class="label">enter password</p>
    <input type="password" id="pass" placeholder="••••••">
    <button onclick="unlock()">unlock</button>
  </div>

  <div class="letter" id="letter">
    <h2>hey you ✿</h2>
    <p>
      if you’re reading this, maybe you miss me a little 🌿<br><br>

      i just want to remind you:<br>
      you are doing better than you think.<br>
      rest when you need to. breathe. take it slow.<br><br>

      i’ll always be cheering for you, even from afar 💚
    </p>

    <button onclick="closeLetter()">close</button>
  </div>

</div>

<!-- floating hearts -->
<div class="hearts">
  <span>💚</span>
  <span>🤍</span>
  <span>💚</span>
  <span>🤍</span>
  <span>💚</span>
</div>

<script src="script.js"></script>
</body>
</html>
</body>
